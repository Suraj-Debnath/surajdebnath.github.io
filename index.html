<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter Page</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <div class="heading"><h1>Converter</h1></div>

    <div class="box">
        <div class="box-1">

            <div class="from-to">
                <div class="from-to-1">
                    <label>From</label>
                    <div class="span">Binary ⏷

                        <div class="drop-down">
                            <ul>
                                <li>Decimal</li>
                                <li>Octal</li>
                                <li>Hexadecimal</li>
                                <li>Binary</li>
                            </ul>
                        </div>

                    </div>
                </div>

                <div class="from-to-1">
                    <label>To</label>
                    <div class="span">Decimal ⏷

                        <div class="drop-down">
                            <ul>
                                <li>Binary</li>
                                <li>Octal</li>
                                <li>Hexadecimal</li>
                                <li>Decimal</li>
                            </ul>
                        </div>

                    </div>
                </div>
            </div>

            <div class="number-result">
                <label class="label" id="inputLabel">Enter binary number</label>
                <input class="input" id="mainInput" placeholder="Enter binary number">
                <div class="converter">
                    <div><p class="convert-btn">= Convert</p></div>
                    <div><p class="reset-btn">= Reset</p></div>
                    <div><p class="swap-btn">= Swap</p></div>
                </div>

                    <label class="label">Decimal Result</label>
                    <input class="input" id="decimal" readonly>

                    <label class="label">Octal Result</label>
                    <input class="input" id="octal" readonly>

                    <label class="label">Hexadecimal Result</label>
                    <input class="input" id="hex" readonly>

                    <label class="label">Binary Result</label>
                    <input class="input" id="binary" readonly>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
